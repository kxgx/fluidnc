# ============================================================================
# 个人定制配置文件 - 微雪 ESP32-S3-PICO CNC
# ============================================================================
# 作者: kxgx
# 硬件: 微雪 ESP32-S3-PICO 开发板 + 自定义CNC电路板
# 日期: 2026-04-12
#
# ⚠️  重要提示：
#   此配置文件仅适用于我个人定制的CNC电路板，包含特定的引脚映射和硬件配置。
#   如果您使用的是其他硬件，请勿直接使用此配置，需要根据实际硬件修改。
#
# 主要特性：
#   - 3轴笛卡尔坐标系 (X, Y双电机并联, Z)
#   - 使用标准STEP/DIR/EN控制（无TMC驱动器）
#   - Y轴双电机并联驱动（Motor0 + Motor1联动）
#   - 禁用PSRAM以释放GPIO33-37作为普通GPIO
#
# Y轴配置：
#   - Motor0: DIR=GPIO14, STEP=GPIO18, EN=GPIO36 (主电机)
#   - Motor1: DIR=GPIO16, STEP=GPIO34, EN=GPIO38 (副电机，与主电机联动)
#
# 注意：GPIO33和GPIO34已通过源码修改启用输出功能
# ============================================================================

# FluidNC 配置文件 - 微雪 ESP32-S3-PICO
# 3轴笛卡尔坐标系 (X, Y双电机并联, Z)
# 使用标准STEP/DIR/EN控制（无TMC驱动器）
#
# Y轴配置：
#   - Motor0: DIR=GPIO14, STEP=GPIO18, EN=GPIO36 (主电机)
#   - Motor1: DIR=GPIO16, STEP=GPIO34, EN=GPIO38 (副电机，与主电机联动)
#
# 注意：GPIO33和GPIO34已通过源码修改启用输出功能

name: "Waveshare ESP32-S3-PICO CNC"

board: ESP32-S3-PICO

stepping:
  engine: RMT
  idle_ms: 250
  dir_delay_us: 1
  pulse_us: 4
  disable_delay_us: 0

axes:
  shared_stepper_disable_pin: NO_PIN
  
  x:
    steps_per_mm: 80.000
    max_rate_mm_per_min: 5000.000
    acceleration_mm_per_sec2: 100.000
    max_travel_mm: 300.000
    soft_limits: false
    homing:
      cycle: 2
      positive_direction: false
      mpos_mm: 0.000
      feed_mm_per_min: 100.000
      seek_mm_per_min: 500.000
      settle_ms: 500
      seek_scaler: 1.100
      feed_scaler: 1.100

    motor0:
      limit_neg_pin: gpio.1
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 1.000
      standard_stepper:
        step_pin: gpio.17
        direction_pin: gpio.13
        disable_pin: gpio.35

  y:
    steps_per_mm: 80.000
    max_rate_mm_per_min: 5000.000
    acceleration_mm_per_sec2: 100.000
    max_travel_mm: 300.000
    soft_limits: false
    homing:
      cycle: 2
      positive_direction: false
      mpos_mm: 0.000
      feed_mm_per_min: 100.000
      seek_mm_per_min: 500.000
      settle_ms: 500
      seek_scaler: 1.100
      feed_scaler: 1.100

    # Y轴主电机 (Motor 0)
    motor0:
      limit_neg_pin: gpio.2
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 1.000
      standard_stepper:
        step_pin: gpio.18
        direction_pin: gpio.14
        disable_pin: gpio.36

    # Y轴副电机 (Motor 1) - 与主电机并联联动
    motor1:
      limit_neg_pin: NO_PIN
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 1.000
      standard_stepper:
        step_pin: gpio.34
        direction_pin: gpio.16
        disable_pin: gpio.38

  z:
    steps_per_mm: 80.000
    max_rate_mm_per_min: 5000.000
    acceleration_mm_per_sec2: 100.000
    max_travel_mm: 100.000
    soft_limits: false
    homing:
      cycle: 1
      positive_direction: true
      mpos_mm: 0.000
      feed_mm_per_min: 100.000
      seek_mm_per_min: 500.000
      settle_ms: 500
      seek_scaler: 1.100
      feed_scaler: 1.100

    motor0:
      limit_neg_pin: gpio.4
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 1.000
      standard_stepper:
        step_pin: gpio.33
        direction_pin: gpio.15
        disable_pin: gpio.37

start:
  must_home: false

i2so:
  bck_pin: NO_PIN
  data_pin: NO_PIN
  ws_pin: NO_PIN

spi:
  miso_pin: NO_PIN
  mosi_pin: NO_PIN
  sck_pin: NO_PIN

sdcard:
  cs_pin: NO_PIN
  card_detect_pin: NO_PIN

control:
  safety_door_pin: NO_PIN
  reset_pin: NO_PIN
  feed_hold_pin: NO_PIN
  cycle_start_pin: NO_PIN
  macro0_pin: NO_PIN
  macro1_pin: NO_PIN
  macro2_pin: NO_PIN
  macro3_pin: NO_PIN

coolant:
  flood_pin: NO_PIN
  mist_pin: NO_PIN
  delay_ms: 0

probe:
  pin: NO_PIN
  check_mode_start: true

macros:
  startup_line0:
  startup_line1:
  macro0:
  macro1:
  macro2:
  macro3:

user_outputs:
  analog0_pin: NO_PIN
  analog1_pin: NO_PIN
  analog2_pin: NO_PIN
  analog3_pin: NO_PIN
  analog0_hz: 5000
  analog1_hz: 5000
  analog2_hz: 5000
  analog3_hz: 5000
  digital0_pin: NO_PIN
  digital1_pin: NO_PIN
  digital2_pin: NO_PIN
  digital3_pin: NO_PIN

Laser:
  pwm_hz: 5000
  output_pin: gpio.12
  enable_pin: NO_PIN
  disable_with_s0: false
  s0_with_disable: true
  tool_num: 0
  speed_map: 0=0.000% 255=100.000%
  off_on_alarm: false

i2c0:
  sda_pin: gpio.42
  scl_pin: gpio.41
