name: 构建和发布固件

on:
  push:
    branches: [ main ]  # 推送到main分支时触发
    tags: [ 'v*' ]      # 创建版本标签时触发
    paths:              # 仅监控以下路径的更改
      - 'FluidNC/**'           # FluidNC源代码
      - 'platformio.ini'       # PlatformIO配置
      - 'sdkconfig.defaults'   # ESP-IDF配置
      - 'requirements.txt'     # Python依赖
      - 'git-version.py'       # 版本生成脚本
      - 'data/**'              # 配置文件
      - '!**.md'               # 排除Markdown文档
      - '!**.txt'              # 排除文本文件（除requirements.txt）
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    name: 构建 ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
    # 构建任务
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pio_env: [ wifi ]              # WiFi配置
        pio_env_variant: [ "", "_s3" ] # ESP32和ESP32-S3变体
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # 递归克隆子模块
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 启用pip缓存
      
      - name: 安装PlatformIO
        # 安装PlatformIO构建工具
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install intelhex  # 生成bootloader所需
      
      - name: 缓存PlatformIO
        # 缓存PlatformIO依赖以加速构建
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-
      
      - name: 编译固件
        run: pio run -e ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
      
      - name: 生成地址信息文件
        # 生成addrinfo文件用于堆栈跟踪解码
        run: |
          python tools/stack_trace_decoder/generate_addrinfo.py \
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.elf \
            -o .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.addrinfo \
            --build ${{ matrix.pio_env }}${{ matrix.pio_env_variant }} \
            --verbose
      
      - name: 上传固件构件
        uses: actions/upload-artifact@v4
        with:
          name: fluidnc-${{ matrix.pio_env }}${{ matrix.pio_env_variant }}-固件
          path: |
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.bin      # 主固件
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.elf      # ELF调试文件
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.addrinfo # 地址信息
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/partitions.bin    # 分区表
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/bootloader.bin    # 引导加载程序
          retention-days: 30  # 保留30天

  release:
    name: 创建Release
    # 创建GitHub Release（仅当打标签时）
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # 仅在标签推送时执行
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 准备发布资源
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"/*.bin release/ 2>/dev/null || true
            cp "$dir"/*.elf release/ 2>/dev/null || true
            cp "$dir"/*.addrinfo release/ 2>/dev/null || true
          done
          cd release
          # 生成SHA256校验和
          sha256sum *.bin > SHA256SUMS.txt
      
      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false                                    # 非草稿
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}  # 预发布标记
          generate_release_notes: true                    # 自动生成发布说明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-to-release:
    name: 上传到Release（分支推送时）
    # 分支推送时的处理（非标签）
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')  # 仅main分支且非标签
    
    steps:
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 列出已构建的固件
        run: |
          echo "已构建的固件文件："
          find artifacts -name "*.bin" -o -name "*.elf" | sort
      
      - name: 显示构建摘要
        run: |
          echo "## 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有配置的固件构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/*/; do
            config=$(basename "$dir")
            echo "| $config | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
          done
