name: 构建和发布固件
# 自动化版本 - 仅在版本号变化时触发

on:
  push:
    tags: [ 'v*' ]      # 仅在创建版本标签时触发
  workflow_dispatch:    # 允许手动触发
    inputs:
      tag:
        description: '发布版本号（可选，留空则使用当前git标签）'
        required: false
        default: ''

jobs:
  build:
    name: 构建 ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
    # 构建任务
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pio_env: [ wifi ]              # WiFi配置
        pio_env_variant: [ "", "_s3" ] # ESP32和ESP32-S3变体
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # 递归克隆子模块
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 启用pip缓存
      
      - name: 安装PlatformIO
        # 安装PlatformIO构建工具
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          pip install intelhex  # 生成bootloader所需
      
      - name: 缓存PlatformIO
        # 缓存PlatformIO依赖以加速构建
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-
      
      - name: 编译固件
        run: pio run -e ${{ matrix.pio_env }}${{ matrix.pio_env_variant }}
      
      - name: 生成地址信息文件
        # 生成addrinfo文件用于堆栈跟踪解码
        run: |
          python tools/stack_trace_decoder/generate_addrinfo.py \
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.elf \
            -o .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.addrinfo \
            --build ${{ matrix.pio_env }}${{ matrix.pio_env_variant }} \
            --verbose
      
      - name: 上传固件构件
        uses: actions/upload-artifact@v4
        with:
          name: fluidnc-${{ matrix.pio_env }}${{ matrix.pio_env_variant }}-固件
          path: |
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.bin      # 主固件
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.elf      # ELF调试文件
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/firmware.addrinfo # 地址信息
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/partitions.bin    # 分区表
            .pio/build/${{ matrix.pio_env }}${{ matrix.pio_env_variant }}/bootloader.bin    # 引导加载程序
          retention-days: 30  # 保留30天

  package:
    name: 打包发布文件
    # 打包任务（在所有构建完成后执行）
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: 下载所有固件构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 设置版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TAG=dev-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi
      
      - name: 创建发布包
        run: |
          mkdir -p release/current
          VERSION="${{ steps.version.outputs.RELEASE_TAG }}"
          
          # 复制所有固件文件
          for dir in artifacts/*/; do
            config=$(basename "$dir")
            cp "$dir"/*.bin release/current/ 2>/dev/null || true
            cp "$dir"/*.elf release/current/ 2>/dev/null || true
          done
          
          # 创建压缩包
          cd release
          zip -r "fluidnc-${VERSION}-firmware.zip" current/
          
          # 生成校验和
          cd current
          if ls *.bin 1> /dev/null 2>&1; then
            sha256sum *.bin > SHA256SUMS.txt
          else
            echo "# No binary files found" > SHA256SUMS.txt
          fi
      
      - name: 上传发布包构件
        uses: actions/upload-artifact@v4
        with:
          name: fluidnc-release-package
          path: |
            release/*.zip
            release/current/*.elf
          retention-days: 30

  release:
    name: 创建GitHub Release
    # 创建GitHub Release（仅在标签推送或手动触发时）
    needs: package  # 依赖打包任务
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'  # 仅标签或手动触发
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载发布包
        uses: actions/download-artifact@v4
        with:
          name: fluidnc-release-package
          path: release
      
      - name: 准备发布资源
        run: |
          cd release
          ls -lh
          # 生成SHA256校验和（如果不存在或为空）
          if [ ! -s SHA256SUMS.txt ]; then
            sha256sum *.bin > SHA256SUMS.txt 2>/dev/null || echo "No bin files found" > SHA256SUMS.txt
          fi
          # 确保文件不为空
          if [ ! -s SHA256SUMS.txt ]; then
            echo "# No checksums available" > SHA256SUMS.txt
          fi
      
      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.zip
            release/*.elf
            release/SHA256SUMS.txt
          draft: false                                    # 非草稿（设为true可先预览）
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}  # 预发布标记
          generate_release_notes: true                    # 自动生成发布说明
          tag_name: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-to-release:
    name: 上传构件（分支推送时）
    # 分支推送时的处理（非标签）- 仅上传构件，不创建Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')  # 仅main分支且非标签
    
    steps:
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 列出已构建的固件
        run: |
          echo "已构建的固件文件："
          find artifacts -name "*.bin" -o -name "*.elf" | sort
      
      - name: 显示构建摘要
        run: |
          echo "## 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有配置的固件构建成功（未创建Release）" >> $GITHUB_STEP_SUMMARY
          echo "💡 可通过Actions页面下载构件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/*/; do
            config=$(basename "$dir")
            echo "| $config | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
          done
